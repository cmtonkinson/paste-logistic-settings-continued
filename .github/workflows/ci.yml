name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.2 liblua5.2-dev luarocks cargo

      - name: Install Lua dependencies
        run: |
          sudo luarocks install --only-deps dev-0.0-1.rockspec
          sudo luarocks install busted
          sudo luarocks install luacheck

      - name: Install stylua
        run: cargo install stylua

      - name: Check formatting
        run: stylua --check .

      - name: Lint
        run: luacheck .

      - name: Run unit tests
        run: busted -o gtest
