[mod-setting-description]
paste-logistic-settings-continued-output-limit-type=Whether the output limit is in stacks or items.
paste-logistic-settings-continued-output-limit=How many stacks/items are allowed to be output to the network?
paste-logistic-settings-continued-accumulate-inserter-output-limit=When enabled, pasting the same recipe into an inserter again adds the new limit to the existing one instead of replacing it.
paste-logistic-settings-continued-request-size-type=Whether the request size is in stacks or items.
paste-logistic-settings-continued-request-size=How much of each ingredient to request?
paste-logistic-settings-continued-enable-ghost-placement=When enabled, pasting onto a recipe-bearing machine can place missing logistics ghosts on the configured face.
paste-logistic-settings-continued-ghost-direction=Which face of the machine should receive the input/output ghost layout.
paste-logistic-settings-continued-ghost-input-inserter=Inserter type to place for the input side when the slot is missing.
paste-logistic-settings-continued-ghost-output-inserter=Inserter type to place for the output side when the slot is missing.
paste-logistic-settings-continued-ghost-output-chest=Logistic chest type to place for the output side when the slot is missing.

