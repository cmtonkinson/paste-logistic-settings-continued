paste-logistic-settings-continued-output-limit=Output limit
paste-logistic-settings-continued-accumulate-inserter-output-limit=Accumulate inserter output limit on repeated paste
paste-logistic-settings-continued-request-size-type=Request size type
paste-logistic-settings-continued-request-size=Request size
paste-logistic-settings-continued-enable-ghost-placement=Enable ghost placement
